<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <h1>Найди себе друга!</h1>

        <form action="/pets/orders" method="post">
            <select name="petType" id="petType">
                <option value="cat">Кошка</option>
                <option value="dog">Собака</option>
                <option value="tiger">Тигр</option>
            </select>

            <input type="text" name="gender">
            <input type="text" name="eyeColor">
            <input type="text" name="tailLength">
            <input type="text" name="name">
            <input type="text" name="dateOfBirth">
            <input type="text" name="email">
            <input type="text" name="phone">
            <input type="text" name="rules">
            <button type="submit">Отправить</button>
        </form>

    </main>
</body>

</html>
